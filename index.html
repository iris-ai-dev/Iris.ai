<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Iris AI</title>
<style>
/* ===== RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#020202;color:#e5e7eb;
  height:100vh;height:100svh;display:flex;overflow:hidden;
  transition:background 0.7s;
}
body.admin{background:#0a0000;}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:0;height:4px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:10px;}

/* ===== OVERLAY ===== */
#overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.8);
  z-index:100;opacity:0;pointer-events:none;transition:opacity 0.3s;
}
#overlay.show{opacity:1;pointer-events:all;}

/* ===== SIDEBAR ===== */
#sidebar{
  position:absolute;left:0;top:0;height:100%;width:288px;
  background:#080808;z-index:101;
  border-right:1px solid rgba(255,255,255,0.05);
  display:flex;flex-direction:column;
  transform:translateX(-100%);transition:transform 0.3s ease;
}
#sidebar.open{transform:translateX(0);}

.sidebar-header{
  padding:32px;border-bottom:1px solid rgba(255,255,255,0.05);
  display:flex;align-items:center;gap:12px;
}
.sidebar-logo{
  width:32px;height:32px;border-radius:8px;background:#2563eb;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;color:#fff;
  box-shadow:0 4px 12px rgba(37,99,235,0.3);flex-shrink:0;
}
.sidebar-title{
  font-weight:900;letter-spacing:0.15em;color:#3b82f6;
  font-size:11px;text-transform:uppercase;font-style:italic;
}

#btn-new{
  margin:24px;padding:16px;border-radius:16px;
  background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);
  color:#60a5fa;font-size:11px;font-weight:900;cursor:pointer;
  display:flex;align-items:center;gap:12px;transition:all 0.2s;
  font-family:inherit;text-transform:uppercase;letter-spacing:0.05em;
}
#btn-new:hover{background:rgba(59,130,246,0.2);}
#btn-new:active{transform:scale(0.95);}

#chat-list{flex:1;overflow-y:auto;padding:0 16px;display:flex;flex-direction:column;gap:8px;}

.chat-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px;border-radius:16px;cursor:pointer;transition:all 0.2s;
  font-size:12px;
}
.chat-item.active{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);}
.chat-item:not(.active){opacity:0.4;}
.chat-item:not(.active):hover{opacity:1;}
.chat-title{display:flex;align-items:center;gap:10px;overflow:hidden;}
.chat-title span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
.chat-del{
  background:none;border:none;color:#374151;cursor:pointer;
  padding:4px;border-radius:6px;display:none;font-size:14px;
  transition:color 0.2s;
}
.chat-item:hover .chat-del{display:block;}
.chat-del:hover{color:#ef4444;}

/* ===== MAIN ===== */
#main{flex:1;display:flex;flex-direction:column;position:relative;min-width:0;}

/* ===== HEADER ===== */
#header{
  height:64px;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;border-bottom:1px solid rgba(255,255,255,0.05);
  background:rgba(0,0,0,0.4);backdrop-filter:blur(40px);
  position:relative;z-index:30;flex-shrink:0;gap:8px;
}
#btn-menu{
  width:44px;height:44px;background:none;border:none;
  color:#e5e7eb;cursor:pointer;display:flex;align-items:center;
  justify-content:center;border-radius:16px;transition:all 0.2s;flex-shrink:0;
}
#btn-menu:hover{background:rgba(255,255,255,0.05);}
#btn-menu:active{transform:scale(0.9);}
.header-center{
  position:absolute;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;
  pointer-events:none;z-index:1;
}
.header-title{
  font-size:12px;font-weight:900;letter-spacing:0.5em;
  text-transform:uppercase;font-style:italic;color:#fff;transition:color 0.3s;
  white-space:nowrap;
}
body.admin .header-title{color:#ef4444;}
.header-sub{
  font-size:7px;font-weight:700;color:#1d4ed8;
  letter-spacing:0.35em;text-transform:uppercase;margin-top:3px;
  white-space:nowrap;
}
body.admin .header-sub{color:#7f1d1d;}

/* ===== MESSAGES ===== */
#messages{
  flex:1;overflow-y:auto;padding:24px;
  display:flex;flex-direction:column;gap:40px;padding-bottom:200px;
}
@media(min-width:768px){#messages{padding:24px 96px;}}
@media(min-width:1024px){#messages{padding:24px 288px;}}

.empty-state{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  opacity:0.1;transform:scale(1.25);
}
.empty-icon{font-size:60px;margin-bottom:24px;}
.empty-text{font-size:10px;font-weight:900;letter-spacing:0.7em;text-transform:uppercase;}

/* ===== MESSAGE ROW ===== */
.msg-row{display:flex;animation:fadeUp 0.5s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.msg-row.user{justify-content:flex-end;}
.msg-row.assistant{justify-content:flex-start;}

.bubble{
  max-width:95%;padding:20px;
  font-size:15px;line-height:1.75;word-break:break-word;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.bubble.user{
  background:#2563eb;color:#fff;
  border-radius:28px;border-bottom-right-radius:4px;
  box-shadow:0 8px 32px rgba(37,99,235,0.15);
}
body.admin .bubble.user{
  background:#450a0a;border:1px solid rgba(239,68,68,0.3);
}
.bubble.assistant{
  background:#121212;border:1px solid rgba(255,255,255,0.05);
  border-radius:28px;border-top-left-radius:4px;color:#f3f4f6;
}

/* ===== CODE BLOCK ===== */
.code-wrap{
  margin:24px 0;border-radius:16px;overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.6);
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.code-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 20px;background:rgba(255,255,255,0.05);
  border-bottom:1px solid rgba(255,255,255,0.05);flex-shrink:0;
}
.code-lang-wrap{display:flex;align-items:center;gap:8px;}
.code-dot{width:8px;height:8px;border-radius:50%;background:#3b82f6;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.code-lang{font-size:10px;color:#60a5fa;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;}
.code-lines-label{font-size:9px;color:#4b5563;font-weight:700;}
.code-long-badge{
  font-size:9px;background:rgba(234,179,8,0.2);color:#fbbf24;
  border:1px solid rgba(234,179,8,0.3);padding:2px 8px;border-radius:20px;font-weight:700;
}
.code-btns{display:flex;align-items:center;gap:12px;}
.btn-download{
  display:flex;align-items:center;gap:6px;color:#60a5fa;
  font-size:10px;font-weight:900;padding:6px 12px;border-radius:20px;
  background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);
  cursor:pointer;font-family:inherit;transition:all 0.2s;
}
.btn-download:hover{background:rgba(59,130,246,0.2);}
.btn-edit{
  padding:6px;color:#eab308;background:none;border:none;cursor:pointer;
  border-radius:8px;transition:all 0.2s;display:flex;align-items:center;
}
.btn-edit:hover{background:rgba(234,179,8,0.1);}
.btn-run{
  display:flex;align-items:center;gap:6px;color:#4ade80;
  font-size:10px;font-weight:900;padding:6px 16px;border-radius:20px;
  background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);
  cursor:pointer;font-family:inherit;transition:all 0.2s;
}
.btn-run:hover{color:#86efac;background:rgba(74,222,128,0.2);}
.btn-run:active{transform:scale(0.95);}
.btn-copy{
  color:#6b7280;background:none;border:none;cursor:pointer;
  transition:color 0.2s;display:flex;align-items:center;padding:4px;
}
.btn-copy:hover{color:#fff;}
.btn-copy.copied{color:#22c55e;}
.code-body{background:rgba(0,0,0,0.4);overflow-x:auto;max-height:400px;overflow-y:auto;}
.code-body pre{
  padding:24px;font-size:13px;font-family:'Fira Code','Courier New',monospace;
  color:rgba(147,197,253,0.9);line-height:1.7;white-space:pre;min-width:max-content;
}

/* ===== SOURCES ===== */
.sources-wrap{margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.05);}
.sources-label{
  display:flex;align-items:center;gap:6px;
  font-size:9px;color:#6b7280;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;
  margin-bottom:8px;
}
.sources-list{display:flex;flex-wrap:wrap;gap:8px;}
.source-link{
  display:flex;align-items:center;gap:6px;font-size:10px;
  background:rgba(59,130,246,0.1);color:#60a5fa;
  border:1px solid rgba(59,130,246,0.2);padding:4px 10px;border-radius:8px;
  text-decoration:none;transition:all 0.2s;max-width:200px;
}
.source-link:hover{background:rgba(59,130,246,0.2);}
.source-link span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ===== FILE PREVIEW ===== */
#file-preview{display:flex;flex-wrap:wrap;gap:8px;padding:0 24px 8px;}
.file-chip{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;padding:8px 12px;font-size:11px;color:#9ca3af;
}
.file-chip-name{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-chip-del{
  background:none;border:none;color:#4b5563;cursor:pointer;
  font-size:14px;line-height:1;transition:color 0.2s;margin-left:4px;
}
.file-chip-del:hover{color:#ef4444;}

/* ===== THINKING ===== */
.thinking{
  display:flex;align-items:center;gap:20px;padding:24px;
  background:#121212;border:1px solid rgba(255,255,255,0.05);
  border-radius:28px;border-top-left-radius:4px;width:fit-content;
  animation:zoomIn 0.3s ease;
}
@keyframes zoomIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.wave-bars{display:flex;align-items:flex-end;gap:5px;height:24px;}
.wave-bar{
  width:5px;border-radius:3px;background:#2563eb;
  animation:irisWave 1.2s ease-in-out infinite;
}
body.admin .wave-bar{background:#dc2626;}
@keyframes irisWave{0%,100%{height:8px;opacity:0.3}50%{height:24px;opacity:1}}
.thinking-text{
  font-size:13px;font-weight:900;letter-spacing:0.2em;
  text-transform:uppercase;font-style:italic;
  color:#3b82f6;animation:blink 1s ease-in-out infinite;
}
body.admin .thinking-text{color:#ef4444;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.5}}

/* ===== INPUT AREA ===== */
#input-area{
  position:absolute;bottom:0;left:0;right:0;
  padding:16px 16px calc(16px + env(safe-area-inset-bottom));
  background:linear-gradient(to top,#020202 60%,rgba(2,2,2,0.9) 80%,transparent);
}
body.admin #input-area{background:linear-gradient(to top,#0a0000 60%,rgba(10,0,0,0.9) 80%,transparent);}

#input-box{
  max-width:896px;margin:0 auto;display:flex;align-items:center;gap:12px;
  background:#0d0d0d;padding:8px;border-radius:32px;
  border:1px solid rgba(255,255,255,0.1);box-shadow:0 8px 32px rgba(0,0,0,0.4);
  transition:border-color 0.3s,box-shadow 0.3s;
}
#input-box:focus-within{
  border-color:rgba(59,130,246,0.4);
  box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 0 4px rgba(59,130,246,0.05);
}
body.admin #input-box:focus-within{border-color:rgba(239,68,68,0.4);}

/* ===== MARKDOWN TABLE ===== */
.md-table-wrap{overflow-x:auto;margin:12px 0;}
.md-table{
  width:100%;border-collapse:collapse;font-size:12px;
  border:1px solid rgba(255,255,255,0.1);border-radius:12px;overflow:hidden;
}
.md-table th{
  background:rgba(59,130,246,0.12);color:#93c5fd;
  padding:10px 14px;text-align:left;font-weight:800;
  font-size:11px;letter-spacing:0.05em;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.md-table td{
  padding:9px 14px;color:#e5e7eb;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.md-table tr:last-child td{border-bottom:none;}
.md-table tr:hover td{background:rgba(255,255,255,0.03);}
#attach-menu{
  position:absolute;bottom:calc(100% + 12px);left:0;
  background:#111;border:1px solid rgba(255,255,255,0.12);
  border-radius:16px;padding:8px;
  box-shadow:0 20px 50px rgba(0,0,0,0.9);
  opacity:0;pointer-events:none;transform:translateY(10px) scale(0.96);
  transition:all 0.2s;z-index:9999;min-width:160px;
}
#attach-menu.open{opacity:1;pointer-events:all;transform:translateY(0) scale(1);}
.attach-option{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;border-radius:12px;cursor:pointer;
  border:none;background:none;width:100%;text-align:left;
  font-family:inherit;font-size:12px;font-weight:700;
  color:#e5e7eb;transition:background 0.15s;white-space:nowrap;
}
.attach-option:hover{background:rgba(255,255,255,0.06);}
.attach-option-icon{font-size:16px;width:22px;text-align:center;}
#btn-attach{
  width:44px;height:44px;background:#0d0d0d;
  border:1px solid rgba(255,255,255,0.12);
  color:#6b7280;cursor:pointer;font-size:22px;font-weight:300;
  border-radius:14px;transition:all 0.2s;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;position:relative;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
#btn-attach:hover{color:#60a5fa;border-color:rgba(59,130,246,0.4);background:#141414;}

#inp{
  flex:1;background:transparent;border:none;outline:none;
  color:#e5e7eb;font-size:15px;padding:16px 8px;font-family:inherit;
}
#inp::placeholder{color:#374151;}
#inp:disabled{opacity:0.5;}

#btn-send,#btn-stop{
  width:52px;height:52px;border:none;border-radius:22px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;flex-shrink:0;
}
#btn-send{
  background:#2563eb;color:#fff;
  box-shadow:0 4px 14px rgba(37,99,235,0.3);
}
#btn-send:hover:not(:disabled){background:#1d4ed8;transform:scale(1.05);}
#btn-send:disabled{background:rgba(255,255,255,0.05);color:#1f2937;cursor:not-allowed;box-shadow:none;}
body.admin #btn-send:not(:disabled){background:#b91c1c;box-shadow:0 4px 14px rgba(185,28,28,0.3);}
#btn-send:active:not(:disabled){transform:scale(0.95);}
#btn-stop{background:#dc2626;color:#fff;box-shadow:0 4px 14px rgba(220,38,38,0.3);display:none;}
#btn-stop:hover{background:#b91c1c;}
#btn-stop:active{transform:scale(0.95);}

/* ===== PREVIEW MODAL ===== */
#preview-modal{
  position:fixed;inset:0;z-index:1000;background:#000;
  display:none;flex-direction:column;
  animation:slideUp 0.5s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#preview-modal.show{display:flex;}
.preview-header{
  height:80px;border-bottom:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;background:#080808;flex-shrink:0;
}
.preview-status{display:flex;align-items:center;gap:14px;}
.preview-dot{width:12px;height:12px;border-radius:50%;animation:pulse 2s infinite;}
.preview-dot.editing{background:#eab308;}
.preview-dot.running{background:#22c55e;}
.preview-label{font-size:11px;font-weight:900;letter-spacing:0.25em;text-transform:uppercase;}
.preview-actions{display:flex;align-items:center;gap:20px;}
#btn-save{
  display:none;background:#2563eb;color:#fff;border:none;
  padding:8px 24px;border-radius:20px;font-size:10px;font-weight:900;
  cursor:pointer;font-family:inherit;letter-spacing:0.1em;transition:all 0.2s;
}
#btn-save:hover{background:#1d4ed8;}
#btn-save:active{transform:scale(0.95);}
#btn-close-preview{
  background:none;border:none;color:#6b7280;cursor:pointer;
  font-size:24px;line-height:1;border-radius:12px;padding:8px;transition:all 0.2s;
}
#btn-close-preview:hover{color:#ef4444;background:rgba(255,255,255,0.05);}
#preview-content{flex:1;overflow:hidden;position:relative;}
#preview-iframe{width:100%;height:100%;border:none;background:#fff;}
#edit-textarea{
  display:none;width:100%;height:100%;background:#050505;
  color:rgba(147,197,253,0.9);font-family:'Fira Code','Courier New',monospace;
  font-size:14px;line-height:1.8;padding:48px;border:none;outline:none;resize:none;
}

/* ===== MODEL SELECTOR ===== */
#model-selector-wrap{
  position:relative;display:flex;align-items:center;flex-shrink:0;
}
#model-btn{
  display:flex;align-items:center;gap:8px;
  background:#0d0d0d;
  border:1px solid rgba(255,255,255,0.12);
  border-radius:14px;padding:10px 14px;cursor:pointer;
  color:#e5e7eb;font-size:10px;font-weight:900;font-family:inherit;
  letter-spacing:0.08em;text-transform:uppercase;transition:all 0.2s;
  white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.4);
  max-width:140px;
}
#model-btn-label{
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  flex:1;min-width:0;
}
#model-btn:hover{background:#141414;border-color:rgba(255,255,255,0.2);}
.model-btn-dot{
  width:7px;height:7px;border-radius:50%;background:#3b82f6;
  animation:pulse 2s infinite;flex-shrink:0;
}
.model-caret{font-size:8px;opacity:0.4;transition:transform 0.2s;margin-left:2px;}
#model-dropdown{
  position:absolute;top:calc(100% + 10px);right:0;
  background:#0d0d0d;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;overflow:hidden;min-width:230px;
  box-shadow:0 20px 60px rgba(0,0,0,0.8);
  opacity:0;pointer-events:none;transform:translateY(-8px) scale(0.97);
  transition:opacity 0.2s,transform 0.2s;z-index:200;
  padding:8px;
}
#model-dropdown.open{opacity:1;pointer-events:all;transform:translateY(0) scale(1);animation:dropIn 0.3s cubic-bezier(0.16,1,0.3,1);}
@keyframes dropIn{from{opacity:0;transform:translateY(-10px) scale(0.94)}to{opacity:1;transform:translateY(0) scale(1)}}
.model-dropdown-header{
  padding:8px 12px 6px;font-size:8px;font-weight:900;
  letter-spacing:0.3em;text-transform:uppercase;color:#374151;
}
.model-option{
  display:flex;align-items:center;gap:12px;padding:11px 14px;
  cursor:pointer;transition:background 0.15s;border:none;
  background:none;width:100%;text-align:left;font-family:inherit;
  border-radius:12px;
}
.model-option:hover{background:rgba(255,255,255,0.05);}
.model-option.selected{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.15);}
.model-option-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}
.model-option-info{flex:1;}
.model-option-name{
  font-size:11px;font-weight:700;color:#e5e7eb;display:block;
}
.model-option.selected .model-option-name{color:#60a5fa;}
.model-option-tag{
  font-size:9px;color:#4b5563;font-weight:600;margin-top:2px;display:block;
}
.model-option-check{
  font-size:12px;color:#3b82f6;opacity:0;transition:opacity 0.15s;
}
.model-option.selected .model-option-check{opacity:1;}

/* ===== MAIN UI ANIMATIONS ===== */
@keyframes fadeDown {
  from{opacity:0;transform:translateY(-12px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeUp {
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn {
  from{opacity:0}
  to{opacity:1}
}
@keyframes slideInLeft {
  from{opacity:0;transform:translateX(-16px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes slideInRight {
  from{opacity:0;transform:translateX(16px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes msgPop {
  0%{opacity:0;transform:translateY(10px) scale(0.97)}
  60%{transform:translateY(-2px) scale(1.005)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}

/* header animate in */

async function firebaseSubmit() {
  if (!firebaseAuth) { showLmErr('ระบบยังโหลดไม่เสร็จค่ะ รอแป๊บนึงนะคะ'); return; }
  var email = document.getElementById('lm-email').value.trim();
  var pass = document.getElementById('lm-pass').value;
  if (!email || !pass) { showLmErr('กรุณากรอกอีเมลและรหัสผ่านค่ะ'); return; }
  var btn = document.getElementById('lm-submit-btn');
  btn.textContent = 'กำลังโหลด...'; btn.disabled = true;
  try {
    if (isRegisterMode) {
      var name = document.getElementById('lm-name').value.trim();
      var pass2 = document.getElementById('lm-pass2').value;
      if (!name) { showLmErr('กรุณาใส่ชื่อค่ะ'); btn.textContent = 'สมัครสมาชิกค่ะ ✦'; btn.disabled = false; return; }
      if (pass !== pass2) { showLmErr('รหัสผ่านไม่ตรงกันค่ะ'); btn.textContent = 'สมัครสมาชิกค่ะ ✦'; btn.disabled = false; return; }
      var cred = await firebaseAuth.createUserWithEmailAndPassword(email, pass);
      await cred.user.updateProfile({ displayName: name });
      onFirebaseLoginSuccess(cred.user);
    } else {
      var cred2 = await firebaseAuth.signInWithEmailAndPassword(email, pass);
      onFirebaseLoginSuccess(cred2.user);
    }
  } catch(e) {
    btn.textContent = isRegisterMode ? 'สมัครสมาชิกค่ะ ✦' : 'เข้าสู่ระบบค่ะ ✦';
    btn.disabled = false;
    var msg = 'เกิดข้อผิดพลาดค่ะ';
    if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') msg = 'อีเมลหรือรหัสผ่านไม่ถูกต้องค่ะ';
    else if (e.code === 'auth/email-already-in-use') msg = 'อีเมลนี้มีบัญชีแล้วค่ะ';
    else if (e.code === 'auth/weak-password') msg = 'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษรค่ะ';
    else if (e.code === 'auth/invalid-email') msg = 'รูปแบบอีเมลไม่ถูกต้องค่ะ';
    showLmErr(msg);
  }
}

// ===== CARD TILT =====
function startCardTilt() {
  var card = document.getElementById('am-card-tilt');
  if (!card) return;
  var modal = document.getElementById('api-setup-modal');

  function onMove(e) {
    var rect = card.getBoundingClientRect();
    var cx = rect.left + rect.width / 2;
    var cy = rect.top + rect.height / 2;
    var mx = (e.clientX || (e.touches && e.touches[0].clientX) || cx);
    var my = (e.clientY || (e.touches && e.touches[0].clientY) || cy);
    var dx = (mx - cx) / (rect.width / 2);
    var dy = (my - cy) / (rect.height / 2);
    var rotX = -dy * 8;
    var rotY = dx * 8;
    card.style.transform = 'perspective(800px) rotateX('+rotX+'deg) rotateY('+rotY+'deg) scale(1.02)';
    card.style.transition = 'transform 0.1s ease';
    // glow ตาม mouse
    card.style.boxShadow = '0 0 0 1px rgba(59,130,246,0.15), 0 32px 80px rgba(0,0,0,0.85), ' +
      (dx*20)+'px '+(dy*20)+'px 40px rgba(59,130,246,0.12)';
  }

  function onLeave() {
    card.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg) scale(1)';
    card.style.transition = 'transform 0.5s cubic-bezier(0.16,1,0.3,1)';
    card.style.boxShadow = '';
  }

  modal.addEventListener('mousemove', onMove);
  modal.addEventListener('touchmove', onMove);
  modal.addEventListener('mouseleave', onLeave);

  // cleanup เมื่อ modal ปิด
  card._tiltCleanup = function() {
    modal.removeEventListener('mousemove', onMove);
    modal.removeEventListener('touchmove', onMove);
    modal.removeEventListener('mouseleave', onLeave);
    onLeave();
  };
}

function checkApiKey() {
  // กลับมาจาก Discord (ใช้ localStorage เพราะ sessionStorage อาจไม่รอด redirect)
  var oauthPending = localStorage.getItem('iris_oauth_pending');
  if (oauthPending) {
    localStorage.removeItem('iris_oauth_pending');
    sessionStorage.removeItem('iris_session');
    window.history.replaceState({}, document.title, window.location.pathname);
    document.getElementById('login-modal').style.display = 'flex';
    document.getElementById('api-setup-modal').style.display = 'none';
    return;
  }

  var sessionOk = sessionStorage.getItem('iris_session') === '1';
  if (!sessionOk || !OR_KEY) {
    document.getElementById('login-modal').style.display = 'flex';
    document.getElementById('api-setup-modal').style.display = 'none';
  } else {
    document.getElementById('login-modal').style.display = 'none';
    document.getElementById('api-setup-modal').style.display = 'none';
    document.getElementById('or-key-input').value = OR_KEY;
  }
}

function deleteChat(e, id) {

  renderChatList();

function renderMessages() {
  var wrap = document.getElementById('messages');
  var chat = getCurrentChat();
  wrap.innerHTML = '';

  if (!chat.messages.length) {
    var empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.style.minHeight = '60vh';
    empty.style.display = 'flex';
    empty.style.flexDirection = 'column';
    empty.style.alignItems = 'center';
    empty.style.justifyContent = 'center';
    empty.innerHTML =
      '<div class="empty-icon">⚡</div>' +
      '<div class="empty-text">Core Initialized</div>';
    wrap.appendChild(empty);
    return;
  }

  chat.messages.forEach(function(msg, idx) {
    wrap.appendChild(createMsgRow(msg, idx));
  });

  setTimeout(function(){ wrap.scrollTop = wrap.scrollHeight; }, 50);
}

function createMsgRow(msg, idx) {
  var row = document.createElement('div');
  row.className = 'msg-row ' + msg.role;
  row.dataset.idx = idx;

  var bubble = document.createElement('div');
  bubble.className = 'bubble ' + msg.role;

  if (msg.role === 'assistant') {
    renderBubble(bubble, msg.content, idx, msg.sources || []);
  } else {
    bubble.style.whiteSpace = 'pre-wrap';
    bubble.textContent = msg.content;
  }

  row.appendChild(bubble);
  return row;
}

function parseInline(text) {
  var escaped = text
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
  // bold
  escaped = escaped.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  // italic
  escaped = escaped.replace(/\*(.+?)\*/g,'<em>$1</em>');
  // links [text](url)
  escaped = escaped.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,'<a href="$2" target="_blank" rel="noopener" style="color:#60a5fa;text-decoration:underline;text-underline-offset:3px;">$1</a>');
  // bare urls
  escaped = escaped.replace(/(^|[\s])(https?:\/\/[^\s<]+)/g,'$1<a href="$2" target="_blank" rel="noopener" style="color:#60a5fa;text-decoration:underline;text-underline-offset:3px;">$2</a>');
  return escaped;
}

function buildTable(lines) {
  var wrap = document.createElement('div');
  wrap.className = 'md-table-wrap';
  var table = document.createElement('table');
  table.className = 'md-table';
  var isHeader = true;
  lines.forEach(function(line) {
    if (/^\|[-: ]+\|/.test(line.trim())) { isHeader = false; return; }
    var cells = line.trim().replace(/^\||\|$/g,'').split('|');
    var row = document.createElement('tr');
    cells.forEach(function(cell) {
      var td = document.createElement(isHeader ? 'th' : 'td');
      td.innerHTML = parseInline(cell.trim());
      row.appendChild(td);
    });
    table.appendChild(row);
    if (isHeader) isHeader = false;
  });
  wrap.appendChild(table);
  return wrap;
}

function renderBubble(el, text, msgIdx, sources) {
  el.innerHTML = '';
  var parts = text.split(/(```[\s\S]*?```|!\[[\s\S]*?\]\([\s\S]*?\))/g);
  var codeCount = 0;

  parts.forEach(function(part) {
    if (part.startsWith('```')) {
      var m = part.match(/```(\w*)\n?([\s\S]*?)```/);
      var lang = m ? m[1] : 'code';
      var code = m ? m[2].replace(/\s+$/, '') : '';
      el.appendChild(createCodeBlock(lang, code, msgIdx, codeCount++));
    } else if (part.startsWith('![')) {
      var imgM = part.match(/!\[(.*?)\]\((.*?)\)/);
      if (imgM) {
        var imgWrap = document.createElement('div');
        imgWrap.style.cssText = 'margin:16px 0;';
        var img = document.createElement('img');
        img.src = imgM[2]; img.alt = imgM[1];
        img.style.cssText = 'max-width:100%;border-radius:16px;border:1px solid rgba(255,255,255,0.1);cursor:pointer;transition:transform 0.2s;';
        img.onclick = function(){ window.open(imgM[2],'_blank'); };
        imgWrap.appendChild(img);
        el.appendChild(imgWrap);
      }
    } else if (part.trim()) {
      // เช็ค markdown table
      var lines = part.split('\n');
      var tableLines = [];
      var nonTableLines = [];
      var inTable = false;
      
      lines.forEach(function(line) {
        if (/^\|.+\|/.test(line.trim())) {
          if (nonTableLines.length) {
            var p = document.createElement('p');
            p.style.whiteSpace = 'pre-wrap';
            p.innerHTML = parseInline(nonTableLines.join('\n'));
            el.appendChild(p);
            nonTableLines = [];
          }
          tableLines.push(line);
          inTable = true;
        } else {
          if (tableLines.length) {
            el.appendChild(buildTable(tableLines));
            tableLines = [];
            inTable = false;
          }
          nonTableLines.push(line);
        }
      });
      if (tableLines.length) el.appendChild(buildTable(tableLines));
      if (nonTableLines.length && nonTableLines.join('').trim()) {
        var p = document.createElement('p');
        p.style.whiteSpace = 'pre-wrap';
        p.innerHTML = parseInline(nonTableLines.join('\n'));
        el.appendChild(p);
      }
    }
  });

  // Sources
  if (sources && sources.length) {
    var sw = document.createElement('div');
    sw.className = 'sources-wrap';
    sw.innerHTML = '<div class="sources-label">🌐 <span>แหล่งข้อมูล</span></div><div class="sources-list"></div>';
    var sl = sw.querySelector('.sources-list');
    sources.forEach(function(s) {
      var a = document.createElement('a');
      a.className = 'source-link';
      a.href = s.uri; a.target = '_blank'; a.rel = 'noopener noreferrer';
      a.innerHTML = '🔗 <span>' + escHtml(s.title || s.uri) + '</span>';
      sl.appendChild(a);
    });
    el.appendChild(sw);
  }
}

function createCodeBlock(lang, code, msgIdx, partIdx) {
  var lineCount = code.split('\n').length;
  var isLong = lineCount > 300;
  var ext = {html:'html',css:'css',js:'js',lua:'lua',python:'py',typescript:'ts',jsx:'jsx',tsx:'tsx'}[lang?.toLowerCase()] || 'txt';

var OR_MODELS = {
  gemini:    'google/gemini-2.5-flash:free',
  gemini25p: 'google/gemini-2.5-pro-exp-03-25:free',
  gemini3:   'google/gemini-2.0-flash-exp:free',
  groq:      'meta-llama/llama-3.3-70b-instruct:free',
  llama:     'meta-llama/llama-3.3-70b-instruct:free',
  qwen:      'qwen/qwen3-coder:free'
};

async function streamFromGemini(contents, systemPrompt) {
  var url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:streamGenerateContent?key=' + API_KEY + '&alt=sse';
  var res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type':'application/json' },
    signal: controller ? controller.signal : undefined,
    body: JSON.stringify({
      contents: contents,
      tools: [{ google_search:{} }],
      systemInstruction: { parts:[{ text:systemPrompt }] }
    })
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  var reader = res.body.getReader();
  var decoder = new TextDecoder();
  var fullText = '';
  var sources = [];
  var buffer = '';
  while (true) {
    var result = await reader.read();
    if (result.done) break;
    if (controller && controller.signal.aborted) break;
    buffer += decoder.decode(result.value, { stream:true });
    var lines = buffer.split('\n');
    buffer = lines.pop() || '';
    for (var i = 0; i < lines.length; i++) {
      var clean = lines[i].trim();
      if (!clean || !clean.startsWith('data: ')) continue;
      var jsonStr = clean.replace('data: ', '');
      if (jsonStr === '[DONE]') continue;
      try {
        var data = JSON.parse(jsonStr);
        var chunk = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        if (chunk) {
          fullText += chunk;
          var chat = getCurrentChat();
          chat.messages[chat.messages.length - 1].content = fullText;
          var wrap = document.getElementById('messages');
          var rows = wrap.querySelectorAll('.msg-row.assistant:not(#thinking-row)');
          var lastRow = rows[rows.length - 1];
          if (lastRow) {
            var bubble = lastRow.querySelector('.bubble');
            if (bubble) renderBubble(bubble, fullText, chat.messages.length - 1, []);
          }
          wrap.scrollTop = wrap.scrollHeight;
        }
        var meta = data.candidates?.[0]?.groundingMetadata;
        if (meta && meta.groundingChunks) {
          sources = meta.groundingChunks
            .filter(function(c){ return c.web; })
            .map(function(c){ return { uri:c.web.uri, title:c.web.title }; });
        }
        if (meta && meta.webSearchQueries && meta.webSearchQueries.length > 0) {
          setThinkingText('ไอริสกำลังหาค่ะ');
        }
      } catch(e) {}
    }
  }
  return { text:fullText, sources:sources };
}

async function streamFromOpenRouter(messages, systemPrompt) {
  if (!OR_KEY) throw new Error('NO_OR_KEY');
  var modelId = OR_MODELS[currentModel] || OR_MODELS.llama;
  var res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + OR_KEY,
      'HTTP-Referer': location.href,
      'X-Title': 'Iris AI'
    },
    signal: controller ? controller.signal : undefined,
    body: JSON.stringify({
      model: modelId,
      stream: true,
      max_tokens: 32000,
      messages: [{ role:'system', content:systemPrompt }].concat(messages)
    })
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  var reader = res.body.getReader();
  var decoder = new TextDecoder();
  var fullText = '';
  var buffer = '';
  while (true) {
    var result = await reader.read();
    if (result.done) break;
    if (controller && controller.signal.aborted) break;
    buffer += decoder.decode(result.value, { stream:true });
    var lines = buffer.split('\n');
    buffer = lines.pop() || '';
    for (var i = 0; i < lines.length; i++) {
      var clean = lines[i].trim();
      if (!clean || !clean.startsWith('data: ')) continue;
      var jsonStr = clean.replace('data: ', '');
      if (jsonStr === '[DONE]') continue;
      try {
        var data = JSON.parse(jsonStr);
        var chunk = data.choices?.[0]?.delta?.content || '';
        if (chunk) {
          fullText += chunk;
          var chat = getCurrentChat();
          chat.messages[chat.messages.length - 1].content = fullText;
          var wrap = document.getElementById('messages');
          var rows = wrap.querySelectorAll('.msg-row.assistant:not(#thinking-row)');
          var lastRow = rows[rows.length - 1];
          if (lastRow) {
            var bubble = lastRow.querySelector('.bubble');
            if (bubble) renderBubble(bubble, fullText, chat.messages.length - 1, []);
          }
          wrap.scrollTop = wrap.scrollHeight;
        }
      } catch(e) {}
    }
  }
  return { text:fullText, sources:[] };
}

async function sendMessage() {
  var text = document.getElementById('inp').value.trim();
  if ((!text && !attachedFiles.length) || isLoading) return;


  var isImageReq = /สร้างรูป|วาดรูป|ขอรูป|generate image/gi.test(text);
  var isCodeReq = /เขียนโค้ด|code|html|css|js|lua|สร้างเว็บ|script/gi.test(text);
  var isSearchReq = /หาข้อมูล|search|คืออะไร|ประวัติ|ใครคือ|ข่าว|อธิบาย/gi.test(text);
  var hasFiles = attachedFiles.length > 0;

  var status = 'ไอริสกำลังวิเคราะห์นะค่ะ';
  if (isImageReq) status = 'ไอริสกำลังวาดรูปให้ค่ะ';
  else if (isCodeReq) status = 'ไอริสกำลังเขียนโค้ดค่ะ';
  else if (isSearchReq) status = 'ไอริสกำลังหาค่ะ';
  else if (hasFiles) status = 'ไอริสกำลังวิเคราะห์ไฟล์ค่ะ';

  // system prompt เพิ่มเติมตามประเภท
  var extraPrompt = '';
  if (isCodeReq) extraPrompt = '\nผู้ใช้ต้องการโค้ด ตอบด้วยโค้ดที่ใช้งานได้จริง ครบถ้วน และอธิบายสั้นๆ';
  if (isSearchReq) extraPrompt = '\nผู้ใช้ต้องการข้อมูล ตอบให้ละเอียด ครบถ้วน อ้างอิงข้อมูลที่ถูกต้อง';
  if (hasFiles) extraPrompt = '\nผู้ใช้แนบไฟล์มาด้วย วิเคราะห์เนื้อหาในไฟล์อย่างละเอียด';

  // สร้าง parts สำหรับส่ง API ครับ
  var userParts = [];
  if (text) userParts.push({ text:text });

  var filesCopy = attachedFiles.slice();
  for (var fi = 0; fi < filesCopy.length; fi++) {
    try {
      var b64 = await fileToBase64(filesCopy[fi]);
      userParts.push({ inlineData:{ mimeType:filesCopy[fi].type, data:b64 } });
    } catch(e) {}
  }

  var displayContent = text + (filesCopy.length ? '\n📎 แนบไฟล์ ' + filesCopy.length + ' ไฟล์: ' + filesCopy.map(function(f){ return f.name; }).join(', ') : '');
  var chat = getCurrentChat();
  chat.messages.push({ role:'user', content:displayContent, parts:userParts });
  if (chat.title === 'แชทใหม่') chat.title = (text || filesCopy[0]?.name || 'ไฟล์').slice(0,15);

  document.getElementById('inp').value = '';
  attachedFiles = [];
  renderFilePreview();
  saveChats();
  renderChatList();
  renderMessages();
  showContinueBtn(false);
  setLoading(true);
  showThinking(status);

  controller = new AbortController();

  // Image generation
  if (isImageReq && !hasFiles) {
    try {
      var imgRes = await fetch('https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=' + API_KEY, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ instances:[{prompt:text}], parameters:{sampleCount:1} })
      });
      var imgData = await imgRes.json();
      var imgUrl = imgData.predictions?.[0] ? 'data:image/png;base64,' + imgData.predictions[0].bytesBase64Encoded : null;
      removeThinking();
      chat.messages.push({
        role:'assistant',
        content: imgUrl ? 'ไอริสวาดรูปให้เสร็จแล้วค่ะ!\n![Generated Image](' + imgUrl + ')' : 'ไอริสขอโทษค่ะ ไม่สามารถวาดรูปได้ในขณะนี้ค่ะ',
        sources:[]
      });
      saveChats();
      renderMessages();
      setLoading(false);
    } catch(e) {
      removeThinking();
      setLoading(false);
    }
    return;
  }

  try {
    // สร้าง history ครับ
    var historyContents = chat.messages.slice(0, -1).map(function(m) {
      return { role: m.role === 'user' ? 'user' : 'model', parts: m.parts || [{ text:m.content }] };
    });
    historyContents.push({ role:'user', parts: userParts.length ? userParts : [{ text:text }] });

    // เพิ่ม placeholder assistant ครับ
    chat.messages.push({ role:'assistant', content:'', sources:[] });
    saveChats();
    renderMessages();

    var systemPrompt = SYSTEM_PROMPT + (isAdmin ? '\n[ROOT]: Admin Mode เปิดอยู่ ผู้ใช้มีสิทธิ์ Superuser' : '') + extraPrompt;
    var streamResult;

    if (!OR_KEY) {
      removeThinking();
      chat.messages[chat.messages.length-1].content = 'ไอริสขอโทษค่ะ ยังไม่ได้ใส่ OpenRouter API Key ค่ะ กรุณาออกจากระบบแล้วใส่ใหม่นะคะ';
      saveChats(); renderMessages(); setLoading(false);
      return;
    }

    // ถ้าขอรูปและมี Gemini key ให้ใช้ Imagen
    if (isImageReq && API_KEY) {
      streamResult = await generateImage(text);
    } else {
      var orMessages = chat.messages.slice(0, -1).map(function(m) {
        return { role: m.role === 'user' ? 'user' : 'assistant', content: m.content };
      });
      orMessages.push({ role:'user', content: text || displayContent });
      // ถ้าเขียนโค้ดให้ใช้ Qwen แทนถ้าเลือกโมเดลอื่นอยู่
      var savedModel = currentModel;
      if (isCodeReq && currentModel !== 'qwen') {
        currentModel = 'qwen';
        streamResult = await streamFromOpenRouter(orMessages, systemPrompt);
        currentModel = savedModel;
      } else {
        streamResult = await streamFromOpenRouter(orMessages, systemPrompt);
      }
    }

    if (!controller || !controller.signal.aborted) {
      chat.messages[chat.messages.length - 1].content = streamResult.text;
      chat.messages[chat.messages.length - 1].sources = streamResult.sources;
      saveChats();
      renderMessages();
      // เช็คว่าโค้ดค้างกลางคันมั้ย
      if (isIncomplete(streamResult.text)) {
        // auto-continue ถ้าโค้ดค้าง ไม่เกิน 3 รอบ
        var autoCount = 0;
        while (isIncomplete(chat.messages[chat.messages.length-1].content) && autoCount < 3) {
          autoCount++;
          setThinkingText('ไอริสเขียนต่อค่ะ... (' + autoCount + '/3)');
          var contMessages = chat.messages.map(function(m) {
            return { role: m.role === 'user' ? 'user' : 'assistant', content: m.content };
          });
          contMessages.push({ role:'user', content:'เขียนต่อจากที่ค้างได้เลยค่ะ ไม่ต้องอธิบายซ้ำ' });
          var contResult = await streamFromOpenRouter(contMessages, systemPrompt);
          chat.messages[chat.messages.length-1].content += contResult.text;
          saveChats(); renderMessages();
        }
        showContinueBtn(isIncomplete(chat.messages[chat.messages.length-1].content));
      } else {
        showContinueBtn(false);
      }
    }

    removeThinking();
    setLoading(false);

  } catch(err) {
    removeThinking();
    if (err.name !== 'AbortError') {
      if (chat.messages[chat.messages.length-1]?.role === 'assistant') {
        chat.messages[chat.messages.length-1].content = 'ไอริสขอโทษค่ะ ระบบขัดข้องชั่วคราว';
      }
      saveChats();
      renderMessages();
      setLoading(false);
      showContinueBtn(true);
    }
  }
}

// ===================================================
// CONTINUE WRITING
// ===================================================
function showContinueBtn(show) {
  document.getElementById('btn-continue-wrap').style.display = show ? 'flex' : 'none';
}

function isIncomplete(text) {
  // เช็คว่าโค้ดค้างกลางคัน
  var codeBlocks = (text.match(/```/g) || []).length;
  if (codeBlocks % 2 !== 0) return true; // ``` เปิดไม่ปิด
  var openBraces = (text.match(/\{/g) || []).length;
  var closeBraces = (text.match(/\}/g) || []).length;
  if (openBraces - closeBraces > 5) return true; // { เปิดค้างมาก
  // ประโยคสุดท้ายไม่จบ (ไม่มี . หรือ ending)
  var trimmed = text.trimEnd();
  var lastChar = trimmed[trimmed.length - 1];
  var endChars = ['.','!','?','。','`'];
  if (lastChar && endChars.indexOf(lastChar) === -1 && !trimmed.endsWith('```')) return true;
  return false;
}

async function continueWriting() {
  if (isLoading) return;
  var chat = getCurrentChat();
  if (!chat.messages.length) return;

  // หา assistant message ล่าสุด
  var lastMsg = chat.messages[chat.messages.length - 1];
  if (lastMsg.role !== 'assistant') return;

  showContinueBtn(false);
  setLoading(true);
  showThinking('ไอริสกำลังเขียนต่อค่ะ');
  controller = new AbortController();

  try {
    var systemPrompt = SYSTEM_PROMPT + '\n[CONTINUE]: จงเขียนต่อจากที่ค้างไว้ทันที ห้ามพูดซ้ำสิ่งที่เขียนไปแล้ว เขียนต่อจากจุดที่หยุดเลย';
    var orMessages = chat.messages.map(function(m) {
      return { role: m.role === 'user' ? 'user' : 'assistant', content: m.content };
    });
    orMessages.push({ role:'user', content:'เขียนต่อจากที่ค้างไว้เลยค่ะ' });

    var streamResult = await streamFromOpenRouter(orMessages, systemPrompt);

    // ต่อ content เข้ากับ message เดิม
    if (!controller || !controller.signal.aborted) {
      chat.messages[chat.messages.length - 1].content += streamResult.text;
      saveChats();
      renderMessages();
    }

    removeThinking();
    setLoading(false);

    // เช็คว่ายังค้างอยู่อีกมั้ย
    if (isIncomplete(chat.messages[chat.messages.length - 1].content)) {
      showContinueBtn(true);
    }

  } catch(err) {
    removeThinking();
    setLoading(false);
    if (err.name !== 'AbortError') showContinueBtn(true);
  }
}

function openRun(code) {
  var html = code;
  if (!code.includes('<html')) {
    html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><script src="https://cdn.tailwindcss.com"><\/script></head><body>' + code + '</body></html>';
  }
  document.getElementById('preview-iframe').srcdoc = html;
  document.getElementById('preview-iframe').style.display = 'block';
  document.getElementById('edit-textarea').style.display = 'none';
  document.getElementById('preview-dot').className = 'preview-dot running';
  document.getElementById('preview-label').textContent = 'LIVE PREVIEW';
  document.getElementById('btn-save').style.display = 'none';
  document.getElementById('preview-modal').classList.add('show');
  editData = null;
}

function openEdit(code, msgIdx, partIdx) {
  editData = { msgIdx:msgIdx, partIdx:partIdx };
  editCodeOriginal = code;
  document.getElementById('edit-textarea').value = code;
  document.getElementById('edit-textarea').style.display = 'block';
  document.getElementById('preview-iframe').style.display = 'none';
  document.getElementById('preview-dot').className = 'preview-dot editing';
  document.getElementById('preview-label').textContent = 'IRIS EDITOR CORE';
  document.getElementById('btn-save').style.display = 'block';
  document.getElementById('preview-modal').classList.add('show');
}

function saveEdit() {
  if (!editData) return;
  var newCode = document.getElementById('edit-textarea').value;
  var chat = getCurrentChat();
  var msg = chat.messages[editData.msgIdx];
  if (!msg) return;
  var parts = msg.content.split(/(```[\s\S]*?```)/g);
  var cp = 0;
  var np = parts.map(function(p) {
    if (p.startsWith('```')) {
      if (cp === editData.partIdx) {
        var lm = p.match(/```(\w*)/);
        var l = lm ? lm[1] : '';
        cp++;
        return '```' + l + '\n' + newCode + '\n```';
      }
      cp++;
    }
    return p;
  });
  msg.content = np.join('');
  saveChats();
  renderMessages();
  closePreview();
}

function closePreview() {
  document.getElementById('preview-modal').classList.remove('show');
  document.getElementById('preview-iframe').srcdoc = '';
  editData = null;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

checkApiKey();
renderChatList();
renderMessages();
updateSendBtn();
initModelSelector();
</script>
